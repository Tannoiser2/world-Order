name: Build native apps (LAN multiplayer)

# Esporta le build NATIVE (desktop + Android). Servono per il multiplayer in LAN:
# dal browser non si puo' ospitare (vedi lobby), tra app native sulla stessa rete si'.
# Si avvia a mano (Actions -> "Run workflow") o pubblicando un tag v*.
# Gli artefatti (binari) si scaricano dalla pagina del run.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  GODOT_VERSION: "4.3"

jobs:
  desktop:
    name: Desktop (Linux + Windows)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          DEST="$HOME/.local/share/godot/export_templates"
          mkdir -p "$DEST"
          cp -rn /root/.local/share/godot/export_templates/* "$DEST"/ 2>/dev/null || true
          ls -la "$DEST"

      - name: Import project
        run: godot --headless --path game --import || true

      - name: Export Linux
        run: |
          mkdir -p build/linux
          godot --headless --path game --export-release "Linux" "$GITHUB_WORKSPACE/build/linux/world-order.x86_64"
          chmod +x build/linux/world-order.x86_64 || true
          ls -la build/linux

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --path game --export-release "Windows" "$GITHUB_WORKSPACE/build/windows/world-order.exe"
          ls -la build/windows

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-order-desktop
          path: |
            build/linux/
            build/windows/
          if-no-files-found: error

  macos:
    name: macOS (.app)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          DEST="$HOME/.local/share/godot/export_templates"
          mkdir -p "$DEST"
          cp -rn /root/.local/share/godot/export_templates/* "$DEST"/ 2>/dev/null || true
          ls -la "$DEST"/4.3.stable/ | grep -i macos || echo "NESSUN TEMPLATE macOS"

      - name: Import project
        run: godot --headless --path game --import || true

      - name: Export macOS (universal, non firmato)
        run: |
          # Build UNIVERSALE (Intel + Apple Silicon). Niente code signing/notarizzazione:
          # per uso personale va bene, ma al primo avvio macOS la mette in quarantena.
          # Vedi docs/multiplayer-lan.md per sbloccarla (xattr / click destro -> Apri).
          mkdir -p build/macos
          OUT="$GITHUB_WORKSPACE/build/macos/world-order.zip"
          godot --headless --verbose --path game --export-release "macOS" "$OUT" 2>&1 | tail -80 || true
          test -f "$OUT" || { echo "!!! .zip macOS non creato"; exit 1; }
          ls -la build/macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-order-macos
          path: build/macos/world-order.zip
          if-no-files-found: error

  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          DEST="$HOME/.local/share/godot/export_templates"
          mkdir -p "$DEST"
          cp -rn /root/.local/share/godot/export_templates/* "$DEST"/ 2>/dev/null || true

      - name: Debug keystore (firma dell'APK)
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "$GITHUB_WORKSPACE/debug.keystore" -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$GITHUB_WORKSPACE/debug.keystore" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Import project
        run: godot --headless --path game --import || true

      - name: Build-tools 34 (apksigner/zipalign per il Target SDK 34 di Godot 4.3)
        run: |
          # Godot 4.3 punta al Target SDK 34: per firmare/zipallineare l'APK servono
          # i build-tools 34 (l'immagine ne ha solo 33.0.2 -> config error vuoto).
          ANDROID_SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/lib/android-sdk}}"
          SDKM="$(command -v sdkmanager || echo "$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager")"
          echo "sdkmanager: $SDKM ; SDK: $ANDROID_SDK"
          yes | "$SDKM" --sdk_root="$ANDROID_SDK" "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -8 || true
          ls "$ANDROID_SDK/build-tools" || true

      - name: Editor Settings (path Java/Android SDK per l'export)
        run: |
          # L'export Android richiede i path di Java SDK (e Android SDK) nelle Editor
          # Settings di Godot. Li ricaviamo dall'immagine e li scriviamo DOPO l'import
          # (cosi' un eventuale file generato dall'import non li sovrascrive).
          JAVA_SDK="${JAVA_HOME:-$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")}"
          ANDROID_SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/lib/android-sdk}}"
          echo "JAVA_HOME=$JAVA_HOME ANDROID_HOME=$ANDROID_HOME -> JAVA_SDK=$JAVA_SDK ANDROID_SDK=$ANDROID_SDK"
          ES="$HOME/.config/godot/editor_settings-4.3.tres"
          mkdir -p "$(dirname "$ES")"
          if [ -f "$ES" ]; then
            sed -i '/export\/android\/java_sdk_path/d' "$ES"
            sed -i '/export\/android\/android_sdk_path/d' "$ES"
            sed -i "s#^\[resource\]#[resource]\nexport/android/android_sdk_path = \"$ANDROID_SDK\"\nexport/android/java_sdk_path = \"$JAVA_SDK\"#" "$ES"
          else
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/java_sdk_path = "%s"\n' "$ANDROID_SDK" "$JAVA_SDK" > "$ES"
          fi
          echo "----- editor_settings-4.3.tres -----"; cat "$ES"

      - name: Export Android APK (debug-signed)
        run: |
          # APK in modalita' DEBUG: firmata con la debug keystore generata sopra (per uso
          # personale/LAN va benissimo e non serve una release keystore).
          mkdir -p build/android
          OUT="$GITHUB_WORKSPACE/build/android/world-order.apk"
          echo "=== template Android disponibili ==="
          ls -la "$HOME/.local/share/godot/export_templates/4.3.stable/" | grep -i android || echo "NESSUN TEMPLATE ANDROID"
          echo "=== editor settings (android/java) ==="
          grep -iE "android|java" "$HOME/.config/godot/editor_settings-4.3.tres" || true
          echo "=== keystore ==="
          keytool -list -keystore "$GITHUB_WORKSPACE/debug.keystore" -storepass android 2>&1 | head -3 || true
          echo "=== export (verbose) ==="
          godot --headless --verbose --path game --export-debug "Android" "$OUT" 2>&1 | tee /tmp/exp.log | tail -120 || true
          test -f "$OUT" || { echo "!!! APK non creato"; exit 1; }
          ls -la build/android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-order-android
          path: build/android/world-order.apk
          if-no-files-found: error
